version: "3.8"

services:
  subledger:
    image: blue060/subledger:latest
    build: .
    container_name: subledger
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./data:/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:-subledger-default-secret-key-change-in-production-please}
      - ENV=production
      # Optional: SMTP
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TLS=${SMTP_TLS:-true}
      # Optional: Push
      - BARK_URL=${BARK_URL:-}
      - SERVERCHAN_KEY=${SERVERCHAN_KEY:-}